{% extends 'base.html' %}

{% block title %}ResourceConnect - Help End Homelessness in Colorado{% endblock %}

{% block content %}
<div class="main-container">
  <main class="hero">
    <div class="hero-content">
      <h1 class="hero-title">ResourceConnect</h1>
      <p class="hero-subtitle">Find support, learn about homelessness, and discover ways to help in Colorado.</p>
      <div class="hero-actions">
        <a href="{% url 'resources:find_resources' %}" class="cta-button">Find Resources</a>
        <a href="{% url 'core:get_involved' %}" class="secondary-button">Get Involved</a>
      </div>
    </div>
  </main>
</div>
{% endblock %}
