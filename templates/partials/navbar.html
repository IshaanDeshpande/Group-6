{% load static %}
<header class="navbar">
  {% with current=request.resolver_match.url_name namespace=request.resolver_match.namespace %}
  <nav class="nav-container">
    <a href="{% url 'core:home' %}" class="nav-brand">ResourceConnect</a>
    <ul class="nav-links">
      <li><a href="{% url 'core:home' %}" class="nav-link{% if namespace == 'core' and current == 'home' %} active{% endif %}">Home</a></li>
      <li><a href="{% url 'core:get_involved' %}" class="nav-link{% if namespace == 'core' and current == 'get_involved' %} active{% endif %}">Get Involved</a></li>
      <li><a href="{% url 'resources:find_resources' %}" class="nav-link{% if namespace == 'resources' %} active{% endif %}">Find Resources</a></li>
      <li><a href="{% url 'core:why_it_matters' %}" class="nav-link{% if namespace == 'core' and current == 'why_it_matters' %} active{% endif %}">Why It Matters</a></li>
      <li><a href="{% url 'core:about' %}" class="nav-link{% if namespace == 'core' and current == 'about' %} active{% endif %}">About Us</a></li>
    </ul>
    {% if request.user.is_authenticated %}
      <a href="{% url 'users:profile' %}" class="nav-avatar">
        <img src="https://api.builder.io/api/v1/image/assets/TEMP/1f093f730945bce58189af8921d0360087bf11e0?width=366" alt="Profile" class="nav-avatar-img" />
      </a>
    {% else %}
      <a href="{% url 'users:signup' %}" class="nav-login">Sign Up / Login</a>
    {% endif %}
  </nav>
  {% endwith %}
</header>
