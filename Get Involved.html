<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Involved</title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>

<body>
  <header class="navbar">
    <nav class="nav-container">
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="#" class="nav-link">Get Involved</a></li>
        <li><a href="#" class="nav-link">Find Resources</a></li>
        <li><a href="#" class="nav-link">Why It Matters</a></li>
        <li><a href="#" class="nav-link">About Us</a></li>
      </ul>
      <a href="#" class="nav-login">Sign Up / Login</a>
    </nav>
  </header>

  <div class="get-involved-layout">
    <aside class="get-involved-sidebar" id="sidebar">
      <button class="sidebar-collapse" id="sidebarToggle" type="button">
        &lt;&lt;
      </button>

      <div class="sidebar-content">
        <a href="#" class="sidebar-button">Main</a>
        <a href="#" class="sidebar-button">Learn</a>
        <a href="#" class="sidebar-button">Quiz</a>

        <p class="sidebar-help-text">
          Not sure where to start? Take the quiz to find involvement opportunities that fit you.
        </p>
      </div>
    </aside>

    <main class="get-involved-main">
      <h1>Get Involved</h1>
      <p>Search for involvement opportunities.</p>

      <div class="get-involved-search">
        <input type="text" placeholder="Search opportunities..." />
        <button type="button">🔍</button>
      </div>

      <h2>RESULTS</h2>
      <div class="get-involved-results"></div>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const sidebarToggle = document.getElementById("sidebarToggle");

    sidebarToggle.addEventListener("click", function () {
      sidebar.classList.toggle("collapsed");

      if (sidebar.classList.contains("collapsed")) {
        sidebarToggle.innerHTML = "&gt;&gt;";
      } else {
        sidebarToggle.innerHTML = "&lt;&lt;";
      }
    });
  </script>
</body>
</html>
